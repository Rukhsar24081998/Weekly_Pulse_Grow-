name: Weekly Pulse

on:
  schedule:
    # Monday 09:00 IST (03:30 UTC)
    - cron: "30 3 * * 1"
  workflow_dispatch:
    inputs:
      use_groq:
        description: "Use Groq for theme clustering (may hit rate limits)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      publish:
        description: "Publish to Google Doc + Gmail draft via MCP"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  weekly-pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MCP_SERVER_URL: ${{ secrets.MCP_SERVER_URL }}
      PUBLISH_GOOGLE_DOC_ID: ${{ secrets.PUBLISH_GOOGLE_DOC_ID }}
      DRAFT_RECIPIENT: ${{ secrets.DRAFT_RECIPIENT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Fetch public store reviews
        run: python scripts/fetch_public_reviews.py --weeks 12

      - name: Phase 1 — ingest
        run: python -m src.ingest.run --weeks 12

      - name: Phase 2 — themes
        run: |
          if [ "${{ github.event.inputs.use_groq || 'false' }}" = "true" ]; then
            python -m src.themes.run
          else
            python -m src.themes.run --no-groq
          fi

      - name: Phase 3 — pulse
        run: python -m src.pulse.run

      - name: Validate pulse
        run: python -m src.guardrails.validate phases/phase-3/pulse.md

      - name: Phase 4+5 — publish via MCP
        if: github.event_name == 'schedule' || github.event.inputs.publish != 'false'
        run: python -m src.publish.e2e_run

      - name: Phase 6 — sign-off report
        run: python scripts/phase6_signoff.py

      - name: Upload pulse artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-pulse-${{ github.run_id }}
          retention-days: 30
          path: |
            phases/phase-3/pulse.md
            phases/phase-3/pulse.json
            phases/phase-4/doc_metadata.json
            phases/phase-5/run.json
            phases/phase-6/signoff_report.json
